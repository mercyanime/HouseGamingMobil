<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Películas - House Gaming</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100vw;
            height: 100vh;
            color: #ffffff;
            font-family: 'Playfair Display', serif;
            overflow-x: hidden;
            position: relative;
        }

        /* Imagen a pantalla completa */
        .fondo-completo {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('7b9c90bac1ed97426b342427ba5d9dd5.jpg') center center / cover no-repeat;
            z-index: 1;
        }

        /* Cuadro más arriba y más pequeño */
        .contenedor-texto {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* ⬆️ Lo ponemos más arriba */
            padding-top: 18vh; /* Ajusta la altura */
            z-index: 2;
        }

        .cuadro-texto {
            max-width: 360px; /* 📏 Más pequeño */
            width: 90%;
            padding: 1.6rem 1.8rem;
            background: rgba(0, 0, 0, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.25),
                        inset 0 0 12px rgba(255, 255, 255, 0.08);
            text-align: center;
        }

        /* Tamaños reducidos */
        .titulo {
            font-size: clamp(26px, 6vw, 32px);
            font-weight: 500;
            margin-bottom: 1.2rem;
            line-height: 1.1;
            letter-spacing: 1.2px;
        }

        .descripcion {
            font-size: clamp(14px, 3.2vw, 17px);
            line-height: 1.6;
            font-weight: 400;
            text-align: justify;
            hyphens: auto;
            margin-bottom: 1.6rem;
            width: 100%;
        }

        /* Botón proporcionado */
        .boton {
            display: inline-block;
            padding: 0.7rem 1.8rem;
            font-size: clamp(15px, 3.8vw, 19px);
            font-weight: 500;
            color: #ffffff;
            background: linear-gradient(135deg, #990000, #ff1a1a);
            border: none;
            border-radius: 8px;
            text-decoration: none;
            box-shadow: 0 0 18px rgba(255, 0, 0, 0.55);
            transition: all 0.3s ease;
            min-width: 150px;
        }

        .boton:hover {
            transform: scale(1.05);
            box-shadow: 0 0 26px rgba(255, 0, 0, 0.75);
        }

        /* Barra de navegación EXACTAMENTE igual a la anterior */
        .barra-nav {
            position: fixed;
            bottom: clamp(4%, 6vh, 8%);
            left: 50%;
            transform: translateX(-50%);
            width: clamp(92%, 96vw, 680px);
            height: clamp(70px, 12vh, 90px);
            background: rgba(20, 0, 0, 0.85);
            border-radius: 50px;
            box-shadow: 
                0 0 18px rgba(255, 0, 0, 0.25), 
                inset 0 0 8px rgba(255, 0, 0, 0.12),
                0 0 25px rgba(255, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 0 clamp(8px, 2vw, 16px);
            z-index: 3;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: clamp(3px, 0.8vh, 6px);
            color: #cccccc;
            font-size: clamp(12px, 2vw, 16px);
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .nav-item i {
            font-size: clamp(24px, 4.5vw, 32px);
        }
        .nav-item.activo {
            color: #ffffff;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.7);
        }
        .nav-item:hover,
        .nav-item:active {
            color: #ff3333;
            transform: scale(1.08);
            text-shadow: 0 0 8px rgba(255, 51, 51, 0.6);
        }
    </style>
</head>
<body>

    <div class="fondo-completo"></div>

    <div class="contenedor-texto">
        <div class="cuadro-texto">
            <h1 class="titulo">Películas</h1>
            <p class="descripcion">
                Si te interesa ver películas en tu navegador aquí te dejamos alternativas para ver tus películas favoritas.
            </p>
            <a href="https://pelisplus.me" target="_blank" class="boton">Ver Películas</a>
        </div>
    </div>

    <div class="barra-nav">
        <a href="index.html" class="nav-item">
            <i class="bi bi-house-fill"></i>
            <span>Home</span>
        </a>
        <a href="juegos.html" class="nav-item">
            <i class="bi bi-controller"></i>
            <span>Juegos</span>
        </a>
        <a href="anime.html" class="nav-item">
            <i class="bi bi-display"></i>
            <span>Anime</span>
        </a>
        <a href="peliculas.html" class="nav-item activo">
            <i class="bi bi-film"></i>
            <span>Películas</span>
        </a>
        <a href="pc.html" class="nav-item">
            <i class="bi bi-cpu"></i>
            <span>PC</span>
        </a>
        <a href="mercy.html" class="nav-item">
            <i class="bi bi-person"></i>
            <span>Mercy</span>
        </a>
    </div>

</body>
</html>
