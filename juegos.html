<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Juegos - House Gaming</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100vw;
            height: 100vh;
            color: #ffffff;
            overflow: hidden;
            position: relative;
            background-color: #000000;
            font-family: 'Rajdhani', sans-serif;
        }

        .contenedor {
            width: 100%;
            height: 100vh;
            position: relative;
            padding-bottom: 6rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-top: 1rem;
        }

        /* Título */
        .titulo-pagina {
            font-size: clamp(24px, 5vw, 30px);
            font-weight: 600;
            margin-bottom: 1rem;
            text-align: center;
            color: #ffffff;
        }

        /* 🎠 Carrusel SIN bordes */
        .carrusel {
            width: 82%;
            max-width: 360px;
            height: 42vh;
            overflow-x: auto;
            overflow-y: hidden;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            display: flex;
            gap: 0;
            border-radius: 14px;
            background-color: #000000;
            /* Quitados bordes y sombra roja */
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .carrusel::-webkit-scrollbar {
            display: none;
        }

        /* Cada diapositiva en columna */
        .slide {
            flex: 0 0 100%;
            width: 100%;
            height: 100%;
            scroll-snap-align: center;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            justify-content: center;
            align-items: center;
            padding: 0.3rem;
        }

        .slide img {
            width: 100%;
            height: auto;
            max-height: 48%;
            object-fit: contain;
            background-color: #000;
            border-radius: 6px;
        }

        /* Indicadores */
        .indicadores {
            display: flex;
            gap: 0.6rem;
            margin-top: 1rem;
        }
        .punto {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
        }
        .punto.activo {
            background-color: #ffffff;
            transform: scale(1.15);
        }

        /* Barra de navegación */
        .barra-nav {
            position: absolute;
            bottom: clamp(4%, 6vh, 8%);
            left: 50%;
            transform: translateX(-50%);
            width: clamp(92%, 96vw, 680px);
            height: clamp(70px, 12vh, 90px);
            background: rgba(20, 0, 0, 0.85);
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 0 clamp(8px, 2vw, 16px);
            z-index: 20;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: clamp(3px, 0.8vh, 6px);
            color: #cccccc;
            font-size: clamp(12px, 2vw, 15px);
            font-weight: 600;
            text-decoration: none;
        }
        .nav-item i {
            font-size: clamp(20px, 3.8vw, 28px);
        }
        .nav-item.activo {
            color: #ffffff;
        }
    </style>
</head>
<body>
    <div class="contenedor">

        <h1 class="titulo-pagina">🎮 House Gaming</h1>

        <!-- 🎠 Carrusel con imágenes agrupadas -->
        <div class="carrusel" id="carrusel">
            <!-- 1 y 2 arriba y abajo -->
            <div class="slide">
                <img src="1.png" alt="Sección 1 arriba">
                <img src="2.png" alt="Sección 1 abajo">
            </div>
            <!-- 3 y 4 arriba y abajo -->
            <div class="slide">
                <img src="3.png" alt="Sección 2 arriba">
                <img src="4.png" alt="Sección 2 abajo">
            </div>
            <!-- 5 y 6 arriba y abajo -->
            <div class="slide">
                <img src="5.png" alt="Sección 3 arriba">
                <img src="6.png" alt="Sección 3 abajo">
            </div>
            <!-- Solo 7 arriba -->
            <div class="slide">
                <img src="7.png" alt="Sección 4">
            </div>
        </div>

        <div class="indicadores" id="indicadores">
            <div class="punto activo"></div>
            <div class="punto"></div>
            <div class="punto"></div>
            <div class="punto"></div>
        </div>

        <div class="barra-nav">
            <a href="index.html" class="nav-item">
                <i class="bi bi-house-fill"></i>
                <span>Home</span>
            </a>
            <a href="juegos.html" class="nav-item activo">
                <i class="bi bi-controller"></i>
                <span>Juegos</span>
            </a>
            <a href="anime.html" class="nav-item">
                <i class="bi bi-display"></i>
                <span>Anime</span>
            </a>
            <a href="peliculas.html" class="nav-item">
                <i class="bi bi-film"></i>
                <span>Películas</span>
            </a>
            <a href="pc.html" class="nav-item">
                <i class="bi bi-cpu"></i>
                <span>PC</span>
            </a>
            <a href="mercy.html" class="nav-item">
                <i class="bi bi-person"></i>
                <span>Mercy</span>
            </a>
        </div>
    </div>

    <script>
        const carrusel = document.getElementById('carrusel');
        const puntos = document.querySelectorAll('.punto');

        carrusel.addEventListener('scroll', () => {
            const anchoSlide = carrusel.clientWidth;
            const posicion = carrusel.scrollLeft;
            const indiceActual = Math.round(posicion / anchoSlide);

            puntos.forEach((punto, i) => {
                punto.classList.toggle('activo', i === indiceActual);
            });
        });
    </script>
</body>
</html>
