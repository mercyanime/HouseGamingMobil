<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Juegos - House Gaming</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100vw;
            height: 100vh;
            background-color: #000000;
            color: #ffffff;
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
            position: relative;
        }
        /* Título con brillo */
        .titulo-seccion {
            position: absolute;
            top: 30vh;
            left: 50%;
            transform: translateX(-50%);
            font-size: clamp(36px, 9vw, 56px);
            letter-spacing: 3px;
            display: flex;
            align-items: center;
            gap: 16px;
            text-shadow: 
                0 0 4px #fff,
                0 0 10px #fff,
                0 0 22px rgba(255, 255, 255, 0.8);
            white-space: nowrap;
        }
        .titulo-seccion i {
            font-size: clamp(40px, 10vw, 60px);
            filter: drop-shadow(0 0 8px #fff);
        }
        /* ✅ Barra IGUAL a la principal, en la misma posición */
        .barra-nav {
            position: absolute;
            bottom: clamp(4%, 6vh, 8%);
            left: 50%;
            transform: translateX(-50%);
            width: clamp(92%, 96vw, 680px);
            height: clamp(70px, 12vh, 90px);
            background: rgba(20, 0, 0, 0.85);
            border-radius: 50px;
            box-shadow: 
                0 0 18px rgba(255, 0, 0, 0.25), 
                inset 0 0 8px rgba(255, 0, 0, 0.12),
                0 0 25px rgba(255, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 0 clamp(8px, 2vw, 16px);
            z-index: 20;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: clamp(3px, 0.8vh, 6px);
            color: #cccccc;
            font-size: clamp(12px, 2vw, 16px);
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.25s ease;
        }
        .nav-item i {
            font-size: clamp(24px, 4.5vw, 32px);
        }
        /* Resaltar la sección actual */
        .nav-item.activo {
            color: #ffffff;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.7);
        }
        .nav-item:hover,
        .nav-item:active {
            color: #ff3333;
            transform: scale(1.08);
            text-shadow: 0 0 8px rgba(255, 51, 51, 0.6);
        }
    </style>
</head>
<body>

    <h1 class="titulo-seccion">
        <i class="bi bi-controller"></i>
        SECCIÓN JUEGOS
    </h1>

    <!-- Barra de navegación en la posición correcta -->
    <div class="barra-nav">
        <a href="index.html" class="nav-item">
            <i class="bi bi-house-fill"></i>
            <span>Home</span>
        </a>
        <a href="juegos.html" class="nav-item activo">
            <i class="bi bi-controller"></i>
            <span>Juegos</span>
        </a>
        <a href="anime.html" class="nav-item">
            <i class="bi bi-display"></i>
            <span>Anime</span>
        </a>
        <a href="peliculas.html" class="nav-item">
            <i class="bi bi-film"></i>
            <span>Películas</span>
        </a>
        <a href="pc.html" class="nav-item">
            <i class="bi bi-cpu"></i>
            <span>PC</span>
        </a>
        <a href="mercy.html" class="nav-item">
            <i class="bi bi-person"></i>
            <span>Mercy</span>
        </a>
    </div>

</body>
</html>
