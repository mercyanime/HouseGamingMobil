<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apps - House Gaming</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100vw;
            height: 100vh;
            color: #ffffff;
            overflow-x: hidden;
            position: relative;
            background-color: #000000;
            font-family: 'Rajdhani', sans-serif;
        }

        .contenedor {
            width: 100%;
            height: 100vh;
            position: relative;
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 3rem;
        }

        .titulo-pagina {
            font-size: clamp(28px, 6vw, 36px);
            font-weight: 600;
            margin-bottom: 2.5rem;
            text-align: center;
        }

        /* 📌 Botones SÚPER PEQUEÑOS */
        .lista-apps {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 5rem;
        }

        .boton-app {
            display: block;
            padding: 0.7rem; /* Espacio interno reducido */
            font-size: clamp(18px, 4vw, 22px); /* Letra pequeña */
            font-weight: 500;
            color: #ffffff;
            text-decoration: none;
            background: linear-gradient(180deg, #ff2222, #990000);
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.3);
            transition: transform 0.2s ease;
        }

        .boton-app:hover {
            transform: scale(1.02);
        }

        /* Barra de navegación igual al resto */
        .barra-nav {
            position: absolute;
            bottom: clamp(4%, 6vh, 8%);
            left: 50%;
            transform: translateX(-50%);
            width: clamp(92%, 96vw, 680px);
            height: clamp(70px, 12vh, 90px);
            background: rgba(20, 0, 0, 0.85);
            border-radius: 50px;
            box-shadow: none;
            border: 1px solid rgba(255, 255, 255, 0.15);
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 0 clamp(8px, 2vw, 16px);
            z-index: 20;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: clamp(3px, 0.8vh, 6px);
            color: #cccccc;
            font-size: clamp(12px, 2vw, 15px);
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: color 0.25s ease;
        }
        .nav-item i {
            font-size: clamp(20px, 3.8vw, 28px);
        }
        .nav-item:hover,
        .nav-item:active {
            color: #ffffff;
            transform: none;
            text-shadow: none;
        }
        .nav-item.home i { color: #ffffff; }
        .nav-item.activo {
            color: #ffffff;
            text-shadow: none;
        }
    </style>
</head>
<body>
    <div class="contenedor">

        <h1 class="titulo-pagina">📱 Aplicaciones</h1>

        <div class="lista-apps">
            <a href="https://files.thexupertv.com/Xuper-6.5.7-Xupertv.vip.apk" target="_blank" class="boton-app">XuperTV</a>
            <a href="https://play.google.com/store/apps/details?id=com.worldance.drama" target="_blank" class="boton-app">Melolo</a>
        </div>

        <div class="barra-nav">
            <a href="index.html" class="nav-item home">
                <i class="bi bi-house-fill"></i>
                <span>Home</span>
            </a>
            <a href="juegos.html" class="nav-item">
                <i class="bi bi-controller"></i>
                <span>Juegos</span>
            </a>
            <a href="anime.html" class="nav-item">
                <i class="bi bi-display"></i>
                <span>Anime</span>
            </a>
            <a href="peliculas.html" class="nav-item">
                <i class="bi bi-film"></i>
                <span>Películas</span>
            </a>
            <a href="pc.html" class="nav-item">
                <i class="bi bi-cpu"></i>
                <span>PC</span>
            </a>
            <a href="mercy.html" class="nav-item">
                <i class="bi bi-person"></i>
                <span>Mercy</span>
            </a>
        </div>

    </div>
</body>
</html>
