<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>House Gaming</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rock+Salt&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #000000;
        }
        .contenedor {
            width: 100%;
            height: 100%;
            position: relative;
        }
        /* Imagen de fondo con nombre correcto */
        .imagen-fondo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            display: block;
        }
        /* Texto HOUSE GAMING: en una sola línea, espaciado y neón */
        .texto-titulo {
            position: absolute;
            top: 11%;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Rock Salt', cursive;
            font-size: 40px;
            color: #ffffff;
            letter-spacing: 4px; /* Separación entre letras */
            word-spacing: 12px; /* Separación entre las dos palabras */
            text-shadow: 
                0 0 3px #fff,
                0 0 8px #fff,
                0 0 18px #fff,
                0 0 35px rgba(255, 255, 255, 0.8);
            z-index: 10;
            pointer-events: none;
        }
        /* Barra de navegación idéntica a la que enviaste */
        .barra-nav {
            position: absolute;
            bottom: 6%;
            left: 50%;
            transform: translateX(-50%);
            width: 94%;
            max-width: 540px;
            height: 75px;
            background: linear-gradient(90deg, #220000 0%, #120000 50%, #220000 100%);
            border-radius: 50px;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.25), inset 0 0 6px rgba(255, 0, 0, 0.15);
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 0 12px;
            z-index: 20;
        }
        /* Elementos del menú */
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 14px;
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.25s ease;
        }
        .nav-item i {
            font-size: 26px;
        }
        /* Estado activo / resaltado como en tu ejemplo */
        .nav-item.activo {
            color: #ffffff;
            background: #ff2233;
            padding: 6px 12px;
            border-radius: 25px;
            box-shadow: 0 0 10px rgba(255, 34, 51, 0.6);
        }
        /* Colores según sección */
        .nav-item.home    { color: #ffffff; }
        .nav-item.juegos  { color: #ff2233; }
        .nav-item.anime   { color: #ffffff; }
        .nav-item.peliculas { color: #cccccc; }
        .nav-item.mercy   { color: #cccccc; }
        /* Efecto al tocar */
        .nav-item:active {
            transform: scale(0.92);
        }
    </style>
</head>
<body>
    <div class="contenedor">
        <!-- Imagen de fondo -->
        <img src="3d8ce0998c8e212b0b91c4ce3780cc44.jpg" alt="House Gaming" class="imagen-fondo">

        <!-- Texto principal corregido -->
        <div class="texto-titulo">
            HOUSE GAMING
        </div>

        <!-- Barra de navegación tal cual la imagen -->
        <div class="barra-nav">
            <div class="nav-item activo home" onclick="abrirPagina('Home')">
                <i class="bi bi-house-fill"></i>
                <span>Home</span>
            </div>
            <div class="nav-item juegos" onclick="abrirPagina('Juegos')">
                <i class="bi bi-joystick"></i>
                <span>Juegos</span>
            </div>
            <div class="nav-item anime" onclick="abrirPagina('Anime')">
                <i class="bi bi-tv-fill"></i>
                <span>Anime</span>
            </div>
            <div class="nav-item peliculas" onclick="abrirPagina('Peliculas')">
                <i class="bi bi-pc-display"></i>
                <span>Peliculas</span>
            </div>
            <div class="nav-item mercy" onclick="abrirPagina('Mercy')">
                <i class="bi bi-wind"></i>
                <span>Mercy</span>
            </div>
        </div>
    </div>

    <script>
        // Función para abrir cada sección en página en blanco
        function abrirPagina(nombre) {
            const nuevaVentana = window.open("", "_blank");
            nuevaVentana.document.write(`
                <!DOCTYPE html>
                <html lang="es" style="margin:0; padding:0; background:#ffffff;">
                <head>
                    <meta charset="UTF-8">
                    <meta name="viewport" content="width=device-width, initial-scale=1.0">
                    <title>${nombre} - House Gaming</title>
                </head>
                <body></body>
                </html>
            `);
            nuevaVentana.document.close();
        }
    </script>
</body>
</html>
