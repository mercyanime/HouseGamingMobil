<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>House Gaming</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rock+Salt&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #000000;
        }
        .contenedor {
            width: 100%;
            height: 100%;
            position: relative;
        }
        /* Imagen con el nombre exacto que me diste */
        .imagen-fondo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            display: block;
        }
        /* Texto House Gaming igual a la imagen, con neón blanco */
        .texto-titulo {
            position: absolute;
            bottom: 12%;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Rock Salt', cursive;
            font-size: 36px;
            color: #ffffff;
            text-shadow:
                0 0 4px #ffffff,
                0 0 10px #ffffff,
                0 0 20px #ffffff,
                0 0 40px rgba(255, 255, 255, 0.8);
            cursor: pointer;
            z-index: 10;
            transition: transform 0.2s ease;
        }
        .texto-titulo:active {
            transform: translateX(-50%) scale(0.96);
            text-shadow:
                0 0 6px #ffffff,
                0 0 15px #ffffff,
                0 0 30px #ffffff,
                0 0 50px rgba(255, 255, 255, 1);
        }
    </style>
</head>
<body>
    <div class="contenedor">
        <img 
            src="3d8ce0998c8e212b0b91c4ce3780cc44.jpg" 
            alt="House Gaming" 
            class="imagen-fondo"
        >

        <div class="texto-titulo" onclick="abrirPagina()">
            House Gaming
        </div>
    </div>

    <script>
        function abrirPagina() {
            const nueva = window.open("", "_blank");
            nueva.document.write(`
                <!DOCTYPE html>
                <html style="margin:0; padding:0; background:#ffffff;">
                <head>
                    <meta charset="UTF-8">
                    <title>Sección</title>
                </head>
                <body></body>
                </html>
            `);
            nueva.document.close();
        }
    </script>
</body>
</html>
