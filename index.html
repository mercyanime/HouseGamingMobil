<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>House Gaming</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rock+Salt&family=Rajdhani:wght@600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #000000;
        }
        .contenedor {
            width: 100%;
            height: 100%;
            position: relative;
        }
        .imagen-fondo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
            display: block;
        }
        /* TÍTULO: SOLO SUBIDO UN POCO MÁS ARRIBA */
        .texto-titulo {
            position: absolute;
            top: clamp(7%, 9vh, 12%); /* Más arriba que antes */
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Rock Salt', cursive;
            font-size: clamp(32px, 5vw, 52px);
            color: #ffffff;
            letter-spacing: clamp(2px, 0.5vw, 5px);
            word-spacing: clamp(8px, 1.5vw, 16px);
            text-align: center;
            text-shadow: 
                0 0 4px #fff,
                0 0 10px #fff,
                0 0 22px #fff,
                0 0 40px rgba(255,255,255,0.75);
            z-index: 10;
            pointer-events: none;
            white-space: nowrap;
        }
        .barra-nav {
            position: absolute;
            bottom: clamp(4%, 6vh, 8%);
            left: 50%;
            transform: translateX(-50%);
            width: clamp(92%, 96vw, 680px);
            height: clamp(70px, 12vh, 90px);
            background: rgba(20, 0, 0, 0.85);
            border-radius: 50px;
            box-shadow: 0 0 18px rgba(255, 0, 0, 0.25), inset 0 0 8px rgba(255, 0, 0, 0.12);
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 0 clamp(8px, 2vw, 16px);
            z-index: 20;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: clamp(3px, 0.8vh, 6px);
            color: #cccccc;
            font-family: 'Rajdhani', sans-serif;
            font-size: clamp(12px, 2vw, 16px);
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.25s ease;
        }
        .nav-item i {
            font-size: clamp(22px, 4vw, 30px);
        }
        .nav-item:hover,
        .nav-item:active {
            color: #ff3333;
            transform: scale(1.08);
            text-shadow: 0 0 8px rgba(255, 51, 51, 0.6);
        }
        .nav-item.home i { color: #ffffff; }
    </style>
</head>
<body>
    <div class="contenedor">
        <img src="3d8ce0998c8e212b0b91c4ce3780cc44.jpg" alt="House Gaming" class="imagen-fondo">

        <div class="texto-titulo">
            HOUSE GAMING
        </div>

        <!-- BARRA CON ICONOS EXACTOS QUE PEDISTE -->
        <div class="barra-nav">
            <div class="nav-item home" onclick="abrirPagina('Home')">
                <i class="bi bi-house-fill"></i>
                <span>Home</span>
            </div>
            <div class="nav-item juegos" onclick="abrirPagina('Juegos')">
                <i class="bi bi-controller"></i>
                <span>Juegos</span>
            </div>
            <div class="nav-item anime" onclick="abrirPagina('Anime')">
                <i class="bi bi-display"></i>
                <span>Anime</span>
            </div>
            <div class="nav-item peliculas" onclick="abrirPagina('Películas')">
                <i class="bi bi-film"></i>
                <span>Películas</span>
            </div>
            <div class="nav-item pc" onclick="abrirPagina('PC')">
                <i class="bi bi-cpu"></i>
                <span>PC</span>
            </div>
            <div class="nav-item mercy" onclick="abrirPagina('Mercy')">
                <i class="bi bi-person"></i>
                <span>Mercy</span>
            </div>
        </div>
    </div>

    <script>
        function abrirPagina(nombre) {
            const nuevaVentana = window.open("", "_blank");
            nuevaVentana.document.write(`
                <!DOCTYPE html>
                <html lang="es" style="margin:0; padding:0; background:#ffffff;">
                <head>
                    <meta charset="UTF-8">
                    <meta name="viewport" content="width=device-width, initial-scale=1.0">
                    <title>${nombre} - House Gaming</title>
                </head>
                <body></body>
                </html>
            `);
            nuevaVentana.document.close();
        }
    </script>
</body>
</html>
