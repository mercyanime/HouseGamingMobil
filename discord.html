<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Discord - House Gaming</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100vw;
            height: 100vh;
            color: #ffffff;
            overflow-x: hidden;
            position: relative;
            background-color: #000000;
            font-family: 'Rajdhani', sans-serif;
        }

        .contenedor {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
            padding-bottom: 8rem;
        }

        .titulo {
            font-size: clamp(26px, 6vw, 34px);
            font-weight: 600;
            margin-bottom: 2.5rem;
            text-align: center;
        }

        /* Botón pequeño */
        .boton {
            display: block;
            width: 100%;
            max-width: 300px;
            padding: 0.7rem;
            font-size: clamp(17px, 4vw, 21px);
            font-weight: 500;
            color: #ffffff;
            text-decoration: none;
            background: linear-gradient(180deg, #ff2222, #990000);
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 0 8px rgba(255, 0, 0, 0.3);
        }

        /* Barra de navegación */
        .barra-nav {
            position: absolute;
            bottom: clamp(4%, 6vh, 8%);
            left: 50%;
            transform: translateX(-50%);
            width: clamp(92%, 96vw, 680px);
            height: clamp(70px, 12vh, 90px);
            background: rgba(20, 0, 0, 0.85);
            border-radius: 50px;
            box-shadow: none;
            border: 1px solid rgba(255, 255, 255, 0.15);
            display: flex;
            align-items: center;
            justify-content: space-around;
            z-index: 20;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: #cccccc;
            font-size: clamp(12px, 2vw, 15px);
            font-weight: 600;
            text-decoration: none;
        }
        .nav-item i {
            font-size: clamp(20px, 3.8vw, 28px);
        }
        .nav-item.activo {
            color: #ffffff;
        }
    </style>
</head>
<body>
    <div class="contenedor">

        <h1 class="titulo">Servidor Discord</h1>

        <!-- Enlace directo al servidor -->
        <a href="https://discord.gg/UAFxwaRuH" target="_blank" class="boton">Ir a Discord</a>

        <div class="barra-nav">
            <a href="index.html" class="nav-item">
                <i class="bi bi-house-fill"></i>
                <span>Home</span>
            </a>
            <a href="juegos.html" class="nav-item">
                <i class="bi bi-controller"></i>
                <span>Juegos</span>
            </a>
            <a href="anime.html" class="nav-item">
                <i class="bi bi-display"></i>
                <span>Anime</span>
            </a>
            <a href="peliculas.html" class="nav-item">
                <i class="bi bi-film"></i>
                <span>Películas</span>
            </a>
            <a href="pc.html" class="nav-item">
                <i class="bi bi-cpu"></i>
                <span>PC</span>
            </a>
            <a href="mercy.html" class="nav-item activo">
                <i class="bi bi-person"></i>
                <span>Mercy</span>
            </a>
        </div>

    </div>
</body>
</html>
