<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anime - House Gaming</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100vw;
            height: 100vh;
            background-color: #000000;
            color: #ffffff;
            overflow-x: hidden;
            position: relative;
        }

        /* Contenedor principal: 2 mitades iguales */
        .contenedor-principal {
            width: 100%;
            height: calc(100vh - 110px); /* Espacio para la barra de navegación */
            display: flex;
            flex-direction: row;
        }

        /* Lado izquierdo: imagen al 50% */
        .lado-imagen {
            width: 50%;
            height: 100%;
            background: url('anime-bg.jpg') center / cover no-repeat;
        }

        /* Lado derecho: texto al 50%, igual que en la imagen */
        .lado-texto {
            width: 50%;
            height: 100%;
            padding: 2.5rem 2rem;
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
        }

        /* Título tal cual */
        .titulo {
            font-family: 'Playfair Display', serif;
            font-size: clamp(32px, 7vw, 44px);
            font-weight: normal;
            text-align: left;
        }

        /* Texto tal cual, misma distribución */
        .descripcion {
            font-family: 'Playfair Display', serif;
            font-size: clamp(18px, 4vw, 24px);
            line-height: 1.7;
            text-align: left;
            white-space: normal;
        }

        /* Adaptación para móvil: se mantiene la proporción visual */
        @media (max-width: 768px) {
            .contenedor-principal {
                flex-direction: row;
            }
            .lado-imagen {
                width: 50%;
                height: 100%;
            }
            .lado-texto {
                width: 50%;
                padding: 2rem 1.5rem;
                gap: 2rem;
            }
            .titulo {
                font-size: clamp(24px, 6vw, 36px);
            }
            .descripcion {
                font-size: clamp(15px, 3.5vw, 20px);
            }
        }

        /* 📌 Barra de navegación sin cambios, en su sitio */
        .barra-nav {
            position: absolute;
            bottom: clamp(4%, 6vh, 8%);
            left: 50%;
            transform: translateX(-50%);
            width: clamp(92%, 96vw, 680px);
            height: clamp(70px, 12vh, 90px);
            background: rgba(20, 0, 0, 0.85);
            border-radius: 50px;
            box-shadow: 
                0 0 18px rgba(255, 0, 0, 0.25), 
                inset 0 0 8px rgba(255, 0, 0, 0.12),
                0 0 25px rgba(255, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 0 clamp(8px, 2vw, 16px);
            z-index: 20;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: clamp(3px, 0.8vh, 6px);
            color: #cccccc;
            font-size: clamp(12px, 2vw, 16px);
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.25s ease;
        }
        .nav-item i {
            font-size: clamp(24px, 4.5vw, 32px);
        }
        .nav-item.activo {
            color: #ffffff;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.7);
        }
        .nav-item:hover,
        .nav-item:active {
            color: #ff3333;
            transform: scale(1.08);
            text-shadow: 0 0 8px rgba(255, 51, 51, 0.6);
        }
    </style>
</head>
<body>

    <div class="contenedor-principal">
        <div class="lado-imagen"></div>
        <div class="lado-texto">
            <h1 class="titulo">Anime Series</h1>
            <p class="descripcion">
Si te gusta el Anime, aquí podrás
encontrar una gran variedad, solo
debes darle click al botón, para ir
directo al sitio web que
recomendamos.
            </p>
        </div>
    </div>

    <!-- Barra de navegación -->
    <div class="barra-nav">
        <a href="index.html" class="nav-item">
            <i class="bi bi-house-fill"></i>
            <span>Home</span>
        </a>
        <a href="juegos.html" class="nav-item">
            <i class="bi bi-controller"></i>
            <span>Juegos</span>
        </a>
        <a href="anime.html" class="nav-item activo">
            <i class="bi bi-display"></i>
            <span>Anime</span>
        </a>
        <a href="peliculas.html" class="nav-item">
            <i class="bi bi-film"></i>
            <span>Películas</span>
        </a>
        <a href="pc.html" class="nav-item">
            <i class="bi bi-cpu"></i>
            <span>PC</span>
        </a>
        <a href="mercy.html" class="nav-item">
            <i class="bi bi-person"></i>
            <span>Mercy</span>
        </a>
    </div>

</body>
</html>
