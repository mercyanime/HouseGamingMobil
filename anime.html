<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anime - House Gaming</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100vw;
            height: 100vh;
            background-color: #000000;
            color: #ffffff;
            font-family: 'Playfair Display', serif;
            overflow-x: hidden;
            position: relative;
        }

        /* Contenedor igual */
        .contenedor {
            width: 100%;
            height: calc(100vh - 110px);
            display: flex;
            align-items: stretch;
        }

        /* Imagen igual */
        .lado-imagen {
            width: 45%;
            height: 100%;
            background: url('ea557993966a4e18928efd28be68f90f.jpg') center left / cover no-repeat;
        }

        /* Texto justificado */
        .lado-texto {
            width: 55%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 1.5rem 2.5rem;
            text-align: justify;
        }

        /* Título en una sola línea, justificado */
        .titulo {
            font-size: clamp(28px, 6vw, 38px);
            font-weight: 500;
            margin-bottom: 2rem;
            line-height: 1.2;
            text-align: justify;
            width: 100%;
        }

        /* Párrafo ajustado */
        .descripcion {
            font-size: clamp(15px, 3.5vw, 20px);
            line-height: 1.7;
            font-weight: 400;
            hyphens: auto;
            margin-bottom: 2.5rem;
            width: 100%;
        }

        /* Botón bonito */
        .boton {
            padding: 0.9rem 2.2rem;
            font-size: clamp(16px, 4vw, 21px);
            font-weight: 500;
            color: #ffffff;
            background: linear-gradient(135deg, #8b0000, #ff2222);
            border: none;
            border-radius: 10px;
            text-decoration: none;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
            transition: all 0.3s ease;
        }

        .boton:hover {
            transform: scale(1.05);
            box-shadow: 0 0 22px rgba(255, 0, 0, 0.7);
        }

        /* Barra de navegación SIN CAMBIOS */
        .barra-nav {
            position: absolute;
            bottom: clamp(4%, 6vh, 8%);
            left: 50%;
            transform: translateX(-50%);
            width: clamp(92%, 96vw, 680px);
            height: clamp(70px, 12vh, 90px);
            background: rgba(20, 0, 0, 0.85);
            border-radius: 50px;
            box-shadow: 
                0 0 18px rgba(255, 0, 0, 0.25), 
                inset 0 0 8px rgba(255, 0, 0, 0.12),
                0 0 25px rgba(255, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 0 clamp(8px, 2vw, 16px);
            z-index: 20;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: clamp(3px, 0.8vh, 6px);
            color: #cccccc;
            font-size: clamp(12px, 2vw, 16px);
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.25s ease;
        }
        .nav-item i {
            font-size: clamp(24px, 4.5vw, 32px);
        }
        .nav-item.activo {
            color: #ffffff;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.7);
        }
        .nav-item:hover,
        .nav-item:active {
            color: #ff3333;
            transform: scale(1.08);
            text-shadow: 0 0 8px rgba(255, 51, 51, 0.6);
        }
    </style>
</head>
<body>

    <div class="contenedor">
        <div class="lado-imagen"></div>
        <div class="lado-texto">
            <h1 class="titulo">Anime Series</h1>
            <p class="descripcion">
                Si te gusta el Anime, aquí podrás encontrar una gran variedad, solo debes darle click al botón, para ir directo al sitio web que recomendamos.
            </p>
            <a href="https://tioanime.com/" target="_blank" class="boton">TioAnime</a>
        </div>
    </div>

    <div class="barra-nav">
        <a href="index.html" class="nav-item">
            <i class="bi bi-house-fill"></i>
            <span>Home</span>
        </a>
        <a href="juegos.html" class="nav-item">
            <i class="bi bi-controller"></i>
            <span>Juegos</span>
        </a>
        <a href="anime.html" class="nav-item activo">
            <i class="bi bi-display"></i>
            <span>Anime</span>
        </a>
        <a href="peliculas.html" class="nav-item">
            <i class="bi bi-film"></i>
            <span>Películas</span>
        </a>
        <a href="pc.html" class="nav-item">
            <i class="bi bi-cpu"></i>
            <span>PC</span>
        </a>
        <a href="mercy.html" class="nav-item">
            <i class="bi bi-person"></i>
            <span>Mercy</span>
        </a>
    </div>

</body>
</html>
