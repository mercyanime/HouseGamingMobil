<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anime - House Gaming</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100vw;
            height: 100vh;
            color: #ffffff;
            overflow-x: hidden;
            position: relative;
            background-color: #000000;
        }

        .contenedor {
            width: 100%;
            height: 100vh;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
        }

        .imagen-fondo {
            width: 50%;
            height: 100%;
            object-fit: cover;
            object-position: center left;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .contenido-texto {
            position: absolute;
            right: 5%;
            top: 50%;
            transform: translateY(-50%);
            width: 45%;
            text-align: center;
            z-index: 15;
        }

        .contenido-texto h1 {
            font-family: 'Rajdhani', sans-serif;
            font-size: clamp(32px, 7vw, 48px);
            font-weight: 600;
            margin-bottom: 1.5rem;
            line-height: 1.1;
            letter-spacing: 1.5px;
        }

        .contenido-texto p {
            font-family: 'Rajdhani', sans-serif;
            font-size: clamp(16px, 3.5vw, 22px);
            line-height: 1.6;
            font-weight: 400;
            margin-bottom: 2rem;
            text-align: justify;
        }

        .boton {
            display: inline-block;
            padding: 1rem 2.5rem;
            font-family: 'Rajdhani', sans-serif;
            font-size: clamp(18px, 4vw, 24px);
            font-weight: 600;
            color: #ffffff;
            background: linear-gradient(135deg, #990000, #ff1a1a);
            border: none;
            border-radius: 12px;
            text-decoration: none;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.6);
            transition: all 0.3s ease;
            min-width: 180px;
        }

        .boton:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.8);
        }

        /* ✅ Barra de navegación SIMPLE, SIN EFECTOS DE LUZ/NEÓN */
        .barra-nav {
            position: absolute;
            bottom: clamp(4%, 6vh, 8%);
            left: 50%;
            transform: translateX(-50%);
            width: clamp(92%, 96vw, 680px);
            height: clamp(70px, 12vh, 90px);
            background: rgba(20, 0, 0, 0.85);
            border-radius: 50px;
            /* Se eliminaron todas las sombras y resplandores rojos */
            box-shadow: none;
            border: 1px solid rgba(255, 255, 255, 0.15);
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 0 clamp(8px, 2vw, 16px);
            z-index: 20;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: clamp(3px, 0.8vh, 6px);
            color: #cccccc;
            font-family: 'Rajdhani', sans-serif;
            font-size: clamp(12px, 2vw, 16px);
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: color 0.25s ease;
            /* Se quitó el efecto de escala y sombra de texto */
        }
        .nav-item i {
            font-size: clamp(22px, 4vw, 30px);
        }
        .nav-item:hover,
        .nav-item:active {
            color: #ffffff;
            /* Sin escala ni resplandor */
            transform: none;
            text-shadow: none;
        }
        .nav-item.home i { color: #ffffff; }
        .nav-item.activo {
            color: #ffffff;
            /* Sin resplandor en el activo */
            text-shadow: none;
        }
    </style>
</head>
<body>
    <div class="contenedor">
        <img src="ea557993966a4e18928efd28be68f90f.jpg" alt="Fondo Anime" class="imagen-fondo">

        <div class="contenido-texto">
            <h1>Anime Series</h1>
            <p>Si te gusta el Anime, aquí podrás encontrar una gran variedad, solo debes darle click al botón, para ir directo al sitio web que recomendamos.</p>
            <a href="https://tioanime.com" target="_blank" class="boton">TioAnime</a>
        </div>

        <div class="barra-nav">
            <a href="index.html" class="nav-item home">
                <i class="bi bi-house-fill"></i>
                <span>Home</span>
            </a>
            <a href="juegos.html" class="nav-item">
                <i class="bi bi-controller"></i>
                <span>Juegos</span>
            </a>
            <a href="anime.html" class="nav-item activo">
                <i class="bi bi-display"></i>
                <span>Anime</span>
            </a>
            <a href="peliculas.html" class="nav-item">
                <i class="bi bi-film"></i>
                <span>Películas</span>
            </a>
            <a href="pc.html" class="nav-item">
                <i class="bi bi-cpu"></i>
                <span>PC</span>
            </a>
            <a href="mercy.html" class="nav-item">
                <i class="bi bi-person"></i>
                <span>Mercy</span>
            </a>
        </div>
    </div>
</body>
</html>
